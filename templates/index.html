<!DOCTYPE html>
<html>
<head>
    <title>Strength Calculator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🏋️ Strength Standards Calculator</h1>

<form method="POST">
    <label>Gender:</label>
    <select name="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

    <label>Age:</label>
    <input type="number" name="age" required>

    <label>Bodyweight (kg):</label>
    <input type="number" step="0.1" name="bodyweight" required>

    <h3>Lifts (1RM)</h3>

    <label>Bench Press:</label>
    <input type="number" step="0.1" name="bench" required>

    <label>Squat:</label>
    <input type="number" step="0.1" name="squat" required>

    <label>Deadlift:</label>
    <input type="number" step="0.1" name="deadlift" required>

    <label>Overhead Press:</label>
    <input type="number" step="0.1" name="overhead" required>

    <button type="submit">Calculate</button>
</form>

{% if score %}
    <h2>Score: {{ score }}</h2>
    <h2>Rank: {{ rank }}</h2>
{% endif %}

</body>
</html>
